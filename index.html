<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannonische Kulturroute</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=MedievalSharp&display=swap');
        .font-serif { font-family: 'Inter', serif; }
        .font-display { font-family: 'MedievalSharp', cursive; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 0; }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .sepia-effect { filter: sepia(0.3) contrast(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const locations = [
            {
                name: 'Pannonische Kulturroute - Alltag im Mittelalter',
                name_hu: 'Pannon Kulturút - Mindennapok a középkorban',
                coords: [47.22, 16.35],
                text: 'Willkommen auf einer Zeitreise durch das Südburgenland und das Komitat Vas. Entdecken Sie das gemeinsame Erbe einer Region, die mittelalterlichen Alltag – von Arbeit und Handel über Glaube bis hin zur Verteidigung – lebendig erlebbar macht[cite: 1292, 1293].',
                text_hu: 'Üdvözöljük egy időutazáson Dél-Burgenlandban és Vas vármegyében. Fedezze fel egy olyan régió közös örökségét, amely a középkori mindennapokat élénken mutatja be[cite: 1292, 1293].',
                image: 'https://images.unsplash.com/photo-1599412227383-b7d4751c8765?q=80&w=800'
            },
            {
                name: 'Litzelsdorf: Ringwallanlage',
                name_hu: 'Litzelsdorf: Sáncrendszer',
                coords: [47.2033, 16.1325],
                text: 'Rekonstruierte mittelalterliche Ringwallanlage als multifunktionale Bühne. Macht die historische Verteidigungsarchitektur erlebbar[cite: 276, 1519].',
                text_hu: 'Rekonstruált középkori sáncrendszer, amely többfunkciós színpadként szolgál[cite: 276, 1519].',
                image: 'https://images.unsplash.com/photo-1570168007204-dfb528c6958f?q=80&w=800'
            },
            {
                name: 'Litzelsdorf: Aussichtsturm',
                name_hu: 'Litzelsdorf: Kilátó',
                coords: [47.2050, 16.1350],
                text: 'Neuer Aussichtsturm im Naturraum zur Inszenierung der historischen Identität der Gemeinde[cite: 276, 1519].',
                text_hu: 'Új kilátó a természetben a közösség történelmi identitásának bemutatására[cite: 276, 1519].',
                image: 'https://images.unsplash.com/photo-1547407139-3c921a66005c?q=80&w=800'
            },
            {
                name: 'Wolfau: Erlebnisareal Zoll und Maut',
                name_hu: 'Wolfau: Vám és illeték élményterület',
                coords: [47.2580, 16.0950],
                text: 'Themenbereich an der historischen Grenzlinie der Lafnitz, die Steiermark und das Komitat Vas trennte[cite: 288, 1531].',
                text_hu: 'Tematikus terület a Lapincs történelmi határvonalán[cite: 288, 1531].',
                image: 'https://images.unsplash.com/photo-1548705085-101177834f47?q=80&w=800'
            },
            {
                name: 'Vasvár: Eisenburger Schanze',
                name_hu: 'Vasvár: Vasvári Sánc',
                coords: [47.0500, 16.8050],
                text: '8 km langer frühmittelalterlicher Erdwall zum Schutz der Soldatenstraße[cite: 681, 1924].',
                text_hu: '8 km hosszú kora középkori sánc a katonai út védelmére[cite: 681, 1924].',
                image: 'https://images.unsplash.com/photo-1599412227383-b7d4751c8765?q=80&w=800'
            }
            // Hinweis: Weitere Standorte können nach dem gleichen Muster ergänzt werden.
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [lang, setLang] = useState('de');
            const [isExpanded, setIsExpanded] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const mapRef = useRef(null);
            const polylineRef = useRef(null);

            useEffect(() => {
                const map = L.map('map', { zoomControl: false }).setView(locations[0].coords, 9);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
                
                L.control.zoom({ position: 'topright' }).addTo(map);

                const coords = locations.slice(1).map(l => l.coords);
                const poly = L.polyline(coords, { 
                    color: '#8b5a2b', 
                    dashArray: '10, 10', 
                    smoothFactor: 2.5,
                    opacity: 0.8 
                }).addTo(map);
                
                polylineRef.current = poly;
                mapRef.current = map;

                map.on('zoomend', () => {
                    const zoom = map.getZoom();
                    poly.setStyle({ opacity: zoom < 13 ? 0.8 : 0 });
                });

                return () => map.remove();
            }, []);

            useEffect(() => {
                if (mapRef.current) {
                    const loc = locations[currentIndex];
                    if (currentIndex === 0) {
                        mapRef.current.fitBounds(polylineRef.current.getBounds(), { padding: [50, 50] });
                    } else {
                        mapRef.current.flyTo(loc.coords, 15);
                    }
                }
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
            }, [currentIndex]);

            const toggleAudio = () => {
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    setIsSpeaking(false);
                } else {
                    const textSource = lang === 'de' ? locations[currentIndex].text : locations[currentIndex].text_hu;
                    const cleanText = textSource.replace(/\]+\]/g, '');
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = lang === 'de' ? 'de-DE' : 'hu-HU';
                    
                    const voices = window.speechSynthesis.getVoices();
                    const pref = voices.find(v => v.name.includes('Natural') && v.lang.startsWith(lang));
                    if (pref) utterance.voice = pref;
                    
                    utterance.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utterance);
                    setIsSpeaking(true);
                }
            };

            const getVisibleDots = () => {
                let start = Math.max(0, currentIndex - 2);
                let end = Math.min(locations.length, start + 6);
                if (end === locations.length) start = Math.max(0, end - 6);
                return Array.from({length: end - start}, (_, i) => start + i);
            };

            const loc = locations[currentIndex];

            return (
                <div className="relative w-full h-screen overflow-hidden bg-[#2c1e16]">
                    <div id="map"></div>

                    {/* Language Switch */}
                    <div className="absolute top-4 left-4 z-[1000] flex bg-[#fdf6e3] border-2 border-[#8b5a2b] rounded-sm shadow-lg overflow-hidden">
                        <button onClick={() => setLang('de')} className={`px-4 py-2 font-bold ${lang === 'de' ? 'bg-[#8b5a2b] text-white' : 'text-[#8b5a2b]'}`}>DE</button>
                        <button onClick={() => setLang('hu')} className={`px-4 py-2 font-bold ${lang === 'hu' ? 'bg-[#8b5a2b] text-white' : 'text-[#8b5a2b]'}`}>HU</button>
                    </div>

                    {/* Info Card */}
                    <div className="absolute bottom-0 left-0 right-0 md:top-0 md:left-4 md:w-[420px] z-[1000] p-4 pointer-events-none md:h-full flex flex-col justify-end md:justify-start">
                        <div className="bg-[#fdf6e3] border-4 border-double border-[#8b5a2b] rounded-sm overflow-hidden flex flex-col pointer-events-auto shadow-2xl h-fit max-h-[75vh] md:max-h-[90vh]">
                            <img src={loc.image} className="h-40 md:h-56 object-cover sepia-effect" />
                            <div className="p-6 overflow-y-auto">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-xs uppercase tracking-widest text-[#8b5a2b] font-bold">
                                        {lang === 'de' ? 'Station' : 'Állomás'} {currentIndex}
                                    </span>
                                    <button onClick={toggleAudio} className="text-[#8b5a2b] text-xl">
                                        {isSpeaking ? '⏹' : '🔊'}
                                    </button>
                                </div>
                                <h2 className="text-2xl font-display text-[#8b5a2b] mb-4">{lang === 'de' ? loc.name : loc.name_hu}</h2>
                                <p className={`text-[#3e2723] leading-relaxed font-serif text-lg ${!isExpanded ? 'line-clamp-4' : ''}`}>
                                    {lang === 'de' ? loc.text : loc.text_hu}
                                </p>
                                {loc.text.length > 150 && (
                                    <button onClick={() => setIsExpanded(!isExpanded)} className="text-[#8b5a2b] font-bold mt-2 underline">
                                        {isExpanded ? (lang === 'de' ? 'Weniger' : 'Kevesebb') : (lang === 'de' ? 'Mehr lesen...' : 'Bővebben...')}
                                    </button>
                                )}
                            </div>

                            <div className="p-4 bg-[#f4ebd0] border-t-2 border-[#8b5a2b] flex items-center justify-between">
                                <button onClick={() => setCurrentIndex(prev => (prev - 1 + locations.length) % locations.length)} className="p-2 border-2 border-[#8b5a2b] text-[#8b5a2b]">◀</button>
                                <div className="flex gap-2">
                                    {getVisibleDots().map(idx => (
                                        <div key={idx} onClick={() => setCurrentIndex(idx)} className={`w-3 h-3 rotate-45 border border-[#8b5a2b] cursor-pointer transition-all ${idx === currentIndex ? 'bg-[#8b5a2b] scale-125' : 'bg-white opacity-40'}`}></div>
                                    ))}
                                </div>
                                <button onClick={() => setCurrentIndex(prev => (prev + 1) % locations.length)} className="p-2 border-2 border-[#8b5a2b] text-[#8b5a2b]">▶</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
