<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannonische Kulturroute</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

        body { margin: 0; padding: 0; background: #2c1e16; overflow: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; font-size: 1.05em; }
        .font-display { font-family: 'Cinzel Decorative', serif; }
        
        #map {
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .leaflet-tile-pane {
            filter: sepia(1) contrast(0.85) brightness(1.05) saturate(0.8);
        }

        /* Scrollbar-Design im Pergament-Stil */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf6e3; }
        ::-webkit-scrollbar-thumb { background: #8b5a2b; border-radius: 4px; }

        .sepia-effect { filter: sepia(0.3) contrast(1.1); }

        /* Leaflet Zoom Position */
        .leaflet-top.leaflet-right .leaflet-control-zoom {
            margin-top: 68px;
            margin-right: 16px;
        }
        
        /* Animation für das Panel */
        .panel-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons als Komponenten (Ersatz für lucide-react in HTML)
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconVolume = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const IconMaximize = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;

        const locations = [
            {
                name: 'Pannonische Kulturroute',
                name_hu: 'Pannon Kulturút',
                coords: [47.1500, 16.4500],
                text: 'Willkommen auf der Pannonischen Kulturroute! Diese historische Reise verbindet das Südburgenland mit dem ungarischen Komitat Vas. Entdecken Sie mittelalterliche Ringwallanlagen, historische Zollstationen und alte Festungen, die von einer gemeinsamen Geschichte erzählen.',
                text_hu: 'Üdvözöljük a Pannon Kulturúton! Ez a történelmi utazás a Dél-Burgenlandot és a magyarországi Vas megyét köti össze. Fedezze fel a középkori sáncrendszereket és a történelmi vámállomásokat.',
                images: ['https://picsum.photos/seed/pannon/800/400']
            },
            {
                name: 'Litzelsdorf: Ringwallanlage',
                name_hu: 'Litzelsdorf: Sáncrendszer',
                coords: [47.2033, 16.1325],
                text: 'Rekonstruierte mittelalterliche Ringwallanlage als multifunktionale Bühne. Macht die historische Verteidigungsarchitektur erlebbar.',
                text_hu: 'Rekonstruált középkori sáncrendszer, amely többfunkciós színpadként szolgál.',
                images: ['https://picsum.photos/seed/ringwall/800/400']
            },
            {
                name: 'Litzelsdorf: Aussichtsturm',
                name_hu: 'Litzelsdorf: Kilátó',
                coords: [47.2050, 16.1350],
                text: 'Neuer Aussichtsturm im Naturraum zur Inszenierung der historischen Identität.',
                text_hu: 'Új kilátó a természetben a történelmi identitás bemutatására.',
                images: ['https://picsum.photos/seed/turm42/800/400']
            },
            {
                name: 'Litzelsdorf: Bogenschützenplatz',
                name_hu: 'Litzelsdorf: Íjászpálya',
                coords: [47.2020, 16.1310],
                text: 'Aktivierende Erlebnisstation als Hommage an die Tradition der Grenzwächter.',
                text_hu: 'Aktív élményállomás a határőrök hagyománya előtt tisztelegve.',
                images: ['https://picsum.photos/seed/bogen7/800/400']
            },
            {
                name: 'Litzelsdorf: Hügelgräber',
                name_hu: 'Litzelsdorf: Halomsírok',
                coords: [47.2150, 16.1200],
                text: '36 Grabhügel aus der Bronzezeit bis zur römischen Kaiserzeit sowie der Fundort des Grabsteins der Julia Vera.',
                text_hu: '36 halomsír a bronzkortól a római császárkorig.',
                images: ['https://picsum.photos/seed/huegel9/800/400']
            },
            {
                name: 'Kemeten: Hofweingarten',
                name_hu: 'Kemeten: Udvari szőlőskert',
                coords: [47.2500, 16.1600],
                text: 'Reaktivierung des mittelalterlichen Weingartens als landschaftsprägendes Kulturgut.',
                text_hu: 'A középkori szőlőskert reaktiválása tájformáló kulturális értékként.',
                images: ['https://picsum.photos/seed/wein15/800/400']
            },
            {
                name: 'Kemeten: Weinschank im Stadel',
                name_hu: 'Kemeten: Borozó a csűrben',
                coords: [47.2475, 16.1511],
                text: 'Umbau des Stadels im Dorfzentrum (Böhmhaus) zu einer Weinschank als zentraler Ankerpunkt.',
                text_hu: 'A falu központjában található csűr (Böhm-ház) borozóvá alakítása.',
                images: ['https://picsum.photos/seed/stadel3/800/400']
            },
            {
                name: 'Kemeten: Meierhof',
                name_hu: 'Kemeten: Major',
                coords: [47.2450, 16.1550],
                text: 'Ehemaliger Meierhof der Familie Batthyány und Skulpturenweg des Holzschnitzers Martin Bauer.',
                text_hu: 'A Batthyány család egykori majorja.',
                images: ['https://picsum.photos/seed/meier8/800/400']
            },
            {
                name: 'Wolfau: Zoll und Maut',
                name_hu: 'Wolfau: Vám és illeték',
                coords: [47.2580, 16.0950],
                text: 'Themenbereich "Mittelalter, Zoll und Maut" an der historischen Grenzlinie der Lafnitz.',
                text_hu: '"Középkori, vám és illeték" tematikus terület a Lapincs határán.',
                images: ['https://picsum.photos/seed/zoll21/800/400']
            },
            {
                name: 'Wolfau: Tschartaken',
                name_hu: 'Wolfau: Csárdák',
                coords: [47.2600, 16.1050],
                text: 'Nachbauten ungarischer Grenzwachtürme (Tschartaken) und generationsübergreifender Spielpark.',
                text_hu: 'Magyar határőrtornyok utánzatai.',
                images: ['https://picsum.photos/seed/tscharta/800/400']
            },
            {
                name: 'Szombathely: Ruinengarten',
                name_hu: 'Szombathely: Romkert',
                coords: [47.2307, 16.6219],
                text: 'Überreste der mittelalterlichen Burg und des Kaiserpalastes auf römischen Fundamenten.',
                text_hu: 'A középkori vár és a császári palota maradványai római alapokon.',
                images: ['https://picsum.photos/seed/ruine5/800/400']
            },
            {
                name: 'Szombathely: St. Martin Kirche',
                name_hu: 'Szombathely: Szent Márton-templom',
                coords: [47.2350, 16.6250],
                text: 'Traditioneller Geburtsort des Heiligen Martin und Knotenpunkt der Via Sancti Martini.',
                text_hu: 'Szent Márton hagyományos szülőhelye.',
                images: ['https://picsum.photos/seed/martin6/800/400']
            },
            {
                name: 'Kőszeg: Jurisics-Burg',
                name_hu: 'Kőszeg: Jurisics-vár',
                coords: [47.3891, 16.5413],
                text: 'Mittelalterliche Festung, berühmt für die Verteidigung gegen die Osmanen im Jahr 1532.',
                text_hu: 'Középkori erőd, híres az 1532-es védekezésről.',
                images: ['https://picsum.photos/seed/burg32/800/400']
            },
            {
                name: 'Kőszeg: Helden-Tor',
                name_hu: 'Kőszeg: Hősök kapuja',
                coords: [47.3880, 16.5420],
                text: 'Ikonisches Wahrzeichen und Teil der mittelalterlichen Stadtbefestigung.',
                text_hu: 'Ikonikus jelkép és a középkori erődítmény része.',
                images: ['https://picsum.photos/seed/tor14/800/400']
            },
            {
                name: 'Vasvár: Eisenburger Schanze',
                name_hu: 'Vasvár: Vasvári Sánc',
                coords: [47.0500, 16.8050],
                text: '8 km langer Erdwall zum Schutz der Soldatenstraße, ein bedeutendes Denkmal.',
                text_hu: '8 km hosszú sánc a katonai út védelmére.',
                images: ['https://picsum.photos/seed/schanz/800/400']
            },
            {
                name: 'Vasvár: Dominikanerkloster',
                name_hu: 'Vasvár: Dominikánus kolostor',
                coords: [47.0520, 16.8000],
                text: 'Beherbergt das Stadtmuseum und zeigt bedeutende Reste mittelalterlicher Bausubstanz.',
                text_hu: 'Helyet ad a városi múzeumnak.',
                images: ['https://picsum.photos/seed/kloster/800/400']
            }
        ];

        const medievalIcon = L.divIcon({
            className: '',
            html: `<div style="filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.5)); transform: translateY(-4px);">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#8b5a2b" stroke="#fdf6e3" stroke-width="1.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <circle cx="12" cy="10" r="3" fill="#fdf6e3" stroke="none"/>
                    </svg>
                   </div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 36]
        });

        function App() {
            const mapRef = useRef(null);
            const [showIntro, setShowIntro] = useState(true);
            const [currentIndex, setCurrentIndex] = useState(1);
            const [language, setLanguage] = useState('de');
            const [isSpeaking, setIsSpeaking] = useState(false);
            const speechRef = useRef(null);

            const introLoc = locations[0];
            const loc = locations[currentIndex];
            const currentName = language === 'de' ? loc.name : loc.name_hu;
            const currentText = language === 'de' ? loc.text : loc.text_hu;
            const introText = language === 'de' ? introLoc.text : introLoc.text_hu;

            // Initialisierung Karte
            useEffect(() => {
                const map = L.map('map', { zoomControl: false }).setView(locations[0].coords, 9);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.control.zoom({ position: 'topright' }).addTo(map);

                const routeCoords = locations.map(l => l.coords);
                L.polyline(routeCoords, { color: '#8b5a2b', dashArray: '10, 10', weight: 3, opacity: 0.6 }).addTo(map);

                locations.forEach((l, i) => {
                    L.marker(l.coords, { icon: medievalIcon }).addTo(map).on('click', () => setCurrentIndex(i));
                });

                mapRef.current = map;
                return () => map.remove();
            }, []);

            // Fly-To Logik
            useEffect(() => {
                if (mapRef.current) {
                    if (showIntro) {
                        mapRef.current.flyTo(locations[0].coords, 9);
                    } else {
                        const isMobile = window.innerWidth < 768;
                        const offset = isMobile ? -0.005 : 0;
                        mapRef.current.flyTo([loc.coords[0] + offset, loc.coords[1]], 14);
                    }
                }
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
            }, [currentIndex, showIntro]);

            const toggleSpeech = () => {
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    setIsSpeaking(false);
                } else {
                    const cleanText = currentText.split('[').map(part => part.includes(']') ? part.split(']')[1] : part).join('');
                    const utt = new SpeechSynthesisUtterance(cleanText);
                    utt.lang = language === 'de' ? 'de-DE' : 'hu-HU';
                    utt.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utt);
                    setIsSpeaking(true);
                }
            };

            const openFullscreen = () => {
                window.open(window.location.href, '_blank');
            };

            return (
                <div className="relative w-full h-screen overflow-hidden font-serif">
                    <div id="map"></div>

                    {/* Sprachauswahl Oben Rechts */}
                    <div className="absolute top-4 right-4 z-[1010]">
                        <div className="flex overflow-hidden shadow-lg" style={{border: '2px solid #8b5a2b', background: 'rgba(44,30,22,0.85)', backdropFilter: 'blur(4px)'}}>
                            <button onClick={() => setLanguage('de')} style={{fontFamily: "'Cinzel', serif", letterSpacing: '0.1em', background: language === 'de' ? '#8b5a2b' : 'transparent', color: language === 'de' ? '#fdf6e3' : '#c4956a'}} className="px-4 py-2 text-sm font-semibold transition-colors">DE</button>
                            <div style={{width: '1px', background: '#8b5a2b'}}></div>
                            <button onClick={() => setLanguage('hu')} style={{fontFamily: "'Cinzel', serif", letterSpacing: '0.1em', background: language === 'hu' ? '#8b5a2b' : 'transparent', color: language === 'hu' ? '#fdf6e3' : '#c4956a'}} className="px-4 py-2 text-sm font-semibold transition-colors">HU</button>
                        </div>
                    </div>

                    {/* Fullscreen Button Unten Rechts */}
                    <div className="absolute bottom-8 right-4 z-[1010]">
                        <button onClick={openFullscreen} className="flex items-center justify-center transition-colors shadow-lg"
                            style={{width: '44px', height: '44px', border: '2px solid #8b5a2b', background: 'rgba(44,30,22,0.85)', backdropFilter: 'blur(4px)', color: '#c4956a'}}
                            onMouseEnter={e => { e.currentTarget.style.background='#8b5a2b'; e.currentTarget.style.color='#fdf6e3'; }}
                            onMouseLeave={e => { e.currentTarget.style.background='rgba(44,30,22,0.85)'; e.currentTarget.style.color='#c4956a'; }}>
                            <IconMaximize />
                        </button>
                    </div>

                    {/* Intro Panel */}
                    {showIntro && (
                        <div className="absolute bottom-0 left-0 right-0 z-[1000] pointer-events-none flex flex-col items-center justify-end md:justify-center md:bottom-auto md:top-0 md:h-full p-4">
                            <div className="pointer-events-auto w-full md:w-[60vw] max-w-3xl overflow-hidden shadow-2xl"
                                style={{border: '4px double #8b5a2b', background: 'rgba(44,30,22,0.82)', backdropFilter: 'blur(4px)'}}>
                                {/* Hero Bild */}
                                <div className="relative h-[28vh] md:h-[35vh] overflow-hidden">
                                    <img src={introLoc.images[0]} className="w-full h-full object-cover" style={{filter: 'sepia(0.5) contrast(0.85) brightness(0.8)'}} />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-6"
                                        style={{background: 'linear-gradient(to bottom, rgba(44,30,22,0.3), rgba(44,30,22,0.75))'}}>
                                        <p style={{fontFamily: "'Cinzel', serif", color: '#c4956a', fontSize: '0.75rem', letterSpacing: '0.3em'}} className="uppercase mb-3">
                                            Südburgenland · Vas megye
                                        </p>
                                        <h1 className="font-display text-[#fdf6e3] text-3xl md:text-5xl leading-tight mb-3" style={{textShadow: '0 4px 16px rgba(0,0,0,0.8)'}}>
                                            {language === 'de' ? 'Pannonische\nKulturroute' : 'Pannon\nKulturút'}
                                        </h1>
                                        <div style={{width: '60px', height: '2px', background: '#8b5a2b', margin: '0 auto'}}></div>
                                    </div>
                                </div>
                                {/* Text */}
                                <div className="p-6 md:p-10 text-center">
                                    <p style={{fontFamily: "'Cormorant Garamond', serif", color: '#fdf6e3', fontSize: '1.2rem', lineHeight: 1.8, opacity: 0.92}}>
                                        {introText}
                                    </p>
                                </div>
                                {/* Start Button */}
                                <div className="pb-8 flex justify-center gap-4 items-center">
                                    <button onClick={toggleSpeech} className="p-2 border border-[#8b5a2b] rounded-full text-[#c4956a] hover:bg-[#8b5a2b] hover:text-white transition-colors">
                                        {isSpeaking ? <IconSquare /> : <IconVolume />}
                                    </button>
                                    <button onClick={() => { setShowIntro(false); setCurrentIndex(1); }}
                                        style={{fontFamily: "'Cinzel', serif", background: '#8b5a2b', color: '#fdf6e3', border: '2px solid #c4956a', letterSpacing: '0.15em'}}
                                        className="px-8 py-3 text-sm uppercase hover:bg-[#c4956a] transition-colors">
                                        {language === 'de' ? 'Route beginnen' : 'Útvonal kezdése'} ▶
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Info Panel – Stationen */}
                    {!showIntro && (
                    <div className="absolute bottom-0 left-0 right-0 z-[1000] p-2 md:top-12 md:left-[4vw] md:w-[480px] md:h-[calc(100vh-6rem)] pointer-events-none flex flex-col justify-end md:justify-start">
                        <div className="rounded-t-xl md:rounded-sm shadow-2xl overflow-hidden pointer-events-auto flex flex-col h-[48vh] md:h-[80vh]"
                            style={{border: '4px double #8b5a2b', background: 'rgba(44,30,22,0.85)', backdropFilter: 'blur(4px)'}}>

                            {/* Bild mit Titel-Overlay */}
                            <div className="relative h-32 md:h-52 flex-shrink-0 overflow-hidden">
                                <img src={loc.images[0]} className="w-full h-full object-cover" style={{filter: 'sepia(0.5) contrast(0.85) brightness(0.75)'}} />
                                <div className="absolute inset-0 flex flex-col justify-end px-4 pb-3"
                                    style={{background: 'linear-gradient(to bottom, rgba(44,30,22,0.1), rgba(44,30,22,0.8))'}}>
                                    <p style={{fontFamily: "'Cinzel', serif", color: '#c4956a', fontSize: '0.65rem', letterSpacing: '0.25em'}} className="uppercase mb-1">
                                        Station {currentIndex}
                                    </p>
                                    <h2 className="font-display text-[#fdf6e3] text-xl md:text-2xl leading-tight tracking-wide" style={{textShadow: '0 2px 8px rgba(0,0,0,0.9)'}}>
                                        {currentName}
                                    </h2>
                                </div>
                            </div>

                            {/* Trennlinie */}
                            <div style={{height: '1px', background: 'linear-gradient(to right, transparent, #8b5a2b, transparent)'}}></div>

                            {/* Text */}
                            <div className="p-4 md:p-6 overflow-y-auto flex-grow min-h-0 flex flex-col gap-3">
                                <div className="flex justify-end">
                                    <button onClick={toggleSpeech} className="rounded-full transition-colors flex items-center justify-center"
                                        style={{border: '1px solid #8b5a2b', color: '#c4956a', padding: '10px', width: '44px', height: '44px'}}
                                        onMouseEnter={e => e.currentTarget.style.background='#8b5a2b'}
                                        onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                                        {isSpeaking ? <IconSquare /> : <IconVolume />}
                                    </button>
                                </div>
                                <p className="leading-relaxed text-lg md:text-xl first-letter:text-5xl first-letter:font-display first-letter:float-left first-letter:mr-2 first-letter:leading-none"
                                    style={{fontFamily: "'Cormorant Garamond', serif", fontWeight: 400, color: '#fdf6e3', opacity: 0.92}}>
                                    {currentText}
                                </p>
                            </div>

                            {/* Navigation */}
                            <div className="p-4 flex items-center justify-between flex-shrink-0"
                                style={{borderTop: '1px solid #8b5a2b', background: 'rgba(44,30,22,0.6)'}}>
                                <button onClick={() => { if (currentIndex === 1) { setShowIntro(true); } else { setCurrentIndex(prev => prev - 1); } }}
                                    className="transition-colors text-lg font-bold"
                                    style={{border: '2px solid #8b5a2b', color: '#c4956a', width: '48px', height: '48px'}}
                                    onMouseEnter={e => { e.currentTarget.style.background='#8b5a2b'; e.currentTarget.style.color='#fdf6e3'; }}
                                    onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#c4956a'; }}>◀</button>
                                <div className="flex gap-1.5">
                                    {(() => {
                                        const stations = locations.slice(1);
                                        const windowSize = 7;
                                        const half = Math.floor(windowSize / 2);
                                        const si = currentIndex - 1;
                                        const start = Math.max(0, Math.min(si - half, stations.length - windowSize));
                                        return Array.from({length: Math.min(windowSize, stations.length)}).map((_, j) => {
                                            const idx = start + j + 1;
                                            return <div key={idx} onClick={() => setCurrentIndex(idx)} className="w-2 h-2 rotate-45 cursor-pointer transition-all"
                                                style={{border: '1px solid #8b5a2b', background: idx === currentIndex ? '#c4956a' : 'transparent', opacity: idx === currentIndex ? 1 : 0.4, transform: idx === currentIndex ? 'rotate(45deg) scale(1.3)' : 'rotate(45deg)'}}></div>;
                                        });
                                    })()}
                                </div>
                                <button onClick={() => { if (currentIndex < locations.length - 1) setCurrentIndex(prev => prev + 1); }}
                                    className="transition-colors text-lg font-bold"
                                    style={{border: '2px solid #8b5a2b', color: '#c4956a', width: '48px', height: '48px'}}
                                    onMouseEnter={e => { e.currentTarget.style.background='#8b5a2b'; e.currentTarget.style.color='#fdf6e3'; }}
                                    onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#c4956a'; }}>▶</button>
                            </div>
                        </div>
                    </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
